<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>쇼츠 트렌드 레이더</title>
<style>
  :root {
    --bg: #0f1115;
    --surface: #181b22;
    --surface2: #1f232d;
    --border: #2a2f3a;
    --text: #e8eaf0;
    --text-dim: #9aa1b0;
    --accent: #ff4d4d;
    --accent-soft: rgba(255, 77, 77, 0.12);
    --green: #3ecf8e;
    --green-soft: rgba(62, 207, 142, 0.14);
    --gold: #ffb43a;
    --shadow: 0 4px 16px rgba(0,0,0,0.35);
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f5f6f8;
      --surface: #ffffff;
      --surface2: #eef0f3;
      --border: #dfe2e8;
      --text: #1c1f26;
      --text-dim: #6b7280;
      --green: #14a56d;
      --shadow: 0 2px 10px rgba(0,0,0,0.08);
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Apple SD Gothic Neo", "Pretendard", "Noto Sans KR", -apple-system, sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.5;
    padding: 24px 16px 80px;
  }
  .wrap { max-width: 1240px; margin: 0 auto; }

  header { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; margin-bottom: 6px; }
  header h1 { font-size: 26px; letter-spacing: -0.5px; }
  header h1 .dot { color: var(--accent); }
  header .meta { color: var(--text-dim); font-size: 13px; }
  .day1-note {
    background: var(--accent-soft); color: var(--accent); border-radius: 10px;
    font-size: 13px; padding: 8px 14px; margin: 10px 0 4px; display: inline-block;
  }
  .info-note {
    background: rgba(167,139,250,0.12); color: #8b6ef3; border-radius: 10px;
    font-size: 13px; padding: 10px 14px; margin: 0 0 14px; line-height: 1.6;
  }

  /* ── 키워드 칩 ── */
  .kw-section { margin: 18px 0 6px; }
  .kw-section h2 { font-size: 15px; margin-bottom: 10px; color: var(--text-dim); font-weight: 600; }
  .kw-chips { display: flex; gap: 8px; flex-wrap: wrap; }
  .kw-chip {
    display: inline-flex; align-items: center; gap: 6px;
    border: 1px solid var(--border); background: var(--surface);
    border-radius: 99px; padding: 6px 14px; font-size: 13px; cursor: pointer;
    color: var(--text); font-family: inherit; transition: all 0.12s;
  }
  .kw-chip:hover { border-color: var(--accent); }
  .kw-chip.on { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
  .kw-chip .cnt { color: var(--text-dim); font-size: 12px; }
  .kw-chip.on .cnt { color: rgba(255,255,255,0.8); }
  .kw-chip .surge { color: var(--green); font-size: 12px; font-weight: 700; }
  .kw-chip .new { color: var(--gold); font-size: 11px; font-weight: 700; }
  .kw-chip.on .surge, .kw-chip.on .new { color: #fff; }

  /* ── 탭/컨트롤 ── */
  .controls {
    display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
    margin: 20px 0 16px; position: sticky; top: 0; background: var(--bg);
    padding: 10px 0; z-index: 5;
  }
  .tabs { display: inline-flex; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .tabs button {
    border: none; background: transparent; color: var(--text-dim);
    padding: 8px 18px; font-size: 14px; cursor: pointer; font-family: inherit;
  }
  .tabs button.on { background: var(--accent); color: #fff; font-weight: 600; }
  .controls input[type=text] {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); padding: 8px 12px; font-size: 13px; font-family: inherit; width: 200px;
  }
  .controls input:focus { outline: none; border-color: var(--accent); }
  .controls select {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); padding: 8px 10px; font-size: 13px; font-family: inherit;
  }
  .summary { margin-left: auto; font-size: 13px; color: var(--text-dim); }

  /* ── 카드 그리드 ── */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(164px, 1fr)); gap: 12px; }
  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
    overflow: hidden; text-decoration: none; color: var(--text);
    box-shadow: var(--shadow); transition: transform 0.12s, border-color 0.12s;
    display: flex; flex-direction: column; position: relative;
  }
  .card:hover { transform: translateY(-3px); border-color: var(--accent); }
  .thumb-box { position: relative; aspect-ratio: 9/16; background: var(--surface2); }
  .thumb-box img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .rank {
    position: absolute; top: 8px; left: 8px;
    background: rgba(0,0,0,0.75); color: #fff; font-weight: 800; font-size: 13px;
    border-radius: 8px; padding: 2px 9px; backdrop-filter: blur(4px);
  }
  .rank.top1 { background: var(--gold); color: #1c1400; }
  .rank.top2, .rank.top3 { background: rgba(255,180,58,0.85); color: #1c1400; }
  .badge-row { position: absolute; top: 8px; right: 40px; display: flex; gap: 4px; }
  .b {
    font-size: 11px; font-weight: 800; border-radius: 6px; padding: 1px 7px;
    backdrop-filter: blur(4px);
  }
  .b-new { background: rgba(255,180,58,0.92); color: #1c1400; }
  .b-gem { background: rgba(167,139,250,0.92); color: #1e1145; }
  .b-up { background: rgba(62,207,142,0.92); color: #04240f; }
  .b-down { background: rgba(0,0,0,0.6); color: #ccc; }
  .b-fire { background: rgba(255,77,77,0.92); color: #fff; }
  .views-badge {
    position: absolute; bottom: 8px; right: 8px;
    background: rgba(0,0,0,0.75); color: #fff; font-weight: 700; font-size: 12px;
    border-radius: 8px; padding: 2px 8px; backdrop-filter: blur(4px);
    font-variant-numeric: tabular-nums;
  }
  .delta-badge {
    position: absolute; bottom: 8px; left: 8px;
    background: rgba(9, 68, 41, 0.88); color: #6effb8; font-weight: 800; font-size: 12px;
    border-radius: 8px; padding: 2px 8px; backdrop-filter: blur(4px);
    font-variant-numeric: tabular-nums;
  }
  .star-btn {
    position: absolute; top: 6px; right: 6px; width: 28px; height: 28px;
    border: none; border-radius: 50%; background: rgba(0,0,0,0.55);
    color: #fff; font-size: 14px; cursor: pointer; backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
  }
  .star-btn:hover { background: rgba(0,0,0,0.8); }
  .star-btn.saved { color: var(--gold); }
  .card-body { padding: 9px 11px 11px; display: flex; flex-direction: column; gap: 4px; flex: 1; }
  .card-title {
    font-size: 13px; font-weight: 600; line-height: 1.4;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .card-meta { font-size: 11px; color: var(--text-dim); margin-top: auto; display: flex; gap: 6px; flex-wrap: wrap; }

  /* ── 아이템 보드 ── */
  .board-empty { text-align: center; color: var(--text-dim); padding: 60px 0; font-size: 14px; }
  .board-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
  .board-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
    box-shadow: var(--shadow); padding: 12px; display: flex; gap: 12px;
  }
  .board-card img { width: 68px; aspect-ratio: 9/16; object-fit: cover; border-radius: 8px; background: var(--surface2); }
  .board-body { flex: 1; display: flex; flex-direction: column; gap: 6px; min-width: 0; }
  .board-title { font-size: 13px; font-weight: 600; line-height: 1.35; }
  .board-title a { color: var(--text); text-decoration: none; }
  .board-title a:hover { color: var(--accent); }
  .board-meta { font-size: 11px; color: var(--text-dim); }
  .board-memo {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); padding: 6px 9px; font-size: 12px; font-family: inherit;
    resize: vertical; min-height: 44px; width: 100%;
  }
  .board-memo:focus { outline: none; border-color: var(--accent); }
  .board-actions { display: flex; gap: 6px; }
  .row-btn {
    border: 1px solid var(--border); background: transparent; color: var(--text-dim);
    border-radius: 6px; padding: 3px 10px; font-size: 12px; cursor: pointer; font-family: inherit;
  }
  .row-btn:hover { color: var(--accent); border-color: var(--accent); }
  .io-row { display: flex; gap: 8px; margin-top: 16px; }
  .io-row button {
    border: 1px solid var(--border); background: var(--surface2); color: var(--text-dim);
    border-radius: 8px; padding: 8px 14px; font-size: 13px; cursor: pointer; font-family: inherit;
  }
  .io-row button:hover { color: var(--text); }

  .onboarding {
    background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
    padding: 48px 32px; text-align: center; box-shadow: var(--shadow); margin-top: 24px;
  }
  .onboarding .big { font-size: 44px; margin-bottom: 14px; }
  .onboarding p { color: var(--text-dim); font-size: 14px; max-width: 460px; margin: 0 auto 6px; }
  .onboarding code {
    background: var(--surface2); border: 1px solid var(--border);
    padding: 2px 10px; border-radius: 6px; font-size: 13px; color: var(--text);
  }

  footer { margin-top: 44px; font-size: 12px; color: var(--text-dim); text-align: center; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>쇼츠 트렌드 레이더<span class="dot">.</span></h1>
    <span class="meta" id="genTime"></span>
  </header>
  <div id="app"></div>
  <footer>
    절대 조회수가 아니라 <b>증가 속도</b> 기준 랭킹 · 4시간마다 자동 갱신<br>
    배지: <b>NEW</b> 오늘 첫 등장 · <b>↑↓</b> 랭킹 변동 · <b>🔥</b> 증가량 상위 · <b>💎</b> 떡상 지수(구독자 대비 조회수 배율 — 작은 채널에서 터진 영상)
  </footer>
</div>

<script src="radar-data.js"></script>
<script>
'use strict';

const app = document.getElementById('app');
const LS_ITEMS = 'radar.items';

let tab = 'rising';        // rising | board
let activeKw = null;
let query = '';
let sortMode = 'score';    // score | views

function loadItems() {
  try { return JSON.parse(localStorage.getItem(LS_ITEMS)) || {}; }
  catch { return {}; }
}
function saveItems(items) { localStorage.setItem(LS_ITEMS, JSON.stringify(items)); }
let items = loadItems();

function formatNum(n) {
  if (n >= 1e8) return (n / 1e8).toFixed(n % 1e8 ? 1 : 0) + '억';
  if (n >= 1e4) {
    const v = n / 1e4;
    return (v >= 100 ? Math.round(v) : v.toFixed(1).replace(/\.0$/, '')) + '만';
  }
  if (n >= 1e3) return (n / 1e3).toFixed(1).replace(/\.0$/, '') + '천';
  return String(n);
}
function esc(s) {
  return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}
function thumbUrl(v) {
  return v.thumb || ('https://i.ytimg.com/vi/' + v.id + '/oar2.jpg');
}

function renderOnboarding() {
  app.innerHTML = `
    <div class="onboarding">
      <div class="big">📡</div>
      <p><b>아직 수집된 데이터가 없어요.</b></p>
      <p>같은 폴더의 <code>레이더-수집.command</code> 를 더블클릭하면
      시드 검색어 전체를 크롤링·분석한 뒤 이 페이지가 자동으로 열립니다.</p>
    </div>`;
}

function videoCard(v, i) {
  const saved = !!items[v.id];
  const rankCls = i === 0 ? 'top1' : i < 3 ? 'top' + (i + 1) : '';
  let badges = '';
  if (v.isNew) badges += '<span class="b b-new">NEW</span>';
  else if (v.rankDelta != null && v.rankDelta >= 3) badges += `<span class="b b-up">↑${v.rankDelta}</span>`;
  else if (v.rankDelta != null && v.rankDelta <= -3) badges += `<span class="b b-down">↓${-v.rankDelta}</span>`;
  if (tab === 'rising' && i < 10 && v.delta != null) badges += '<span class="b b-fire">🔥</span>';
  if (v.outlier != null && v.outlier >= 5) {
    badges += `<span class="b b-gem" title="구독자 대비 조회수 배율">💎${v.outlier >= 10 ? Math.round(v.outlier) : v.outlier}배</span>`;
  }
  const delta = (v.delta != null && v.delta > 0)
    ? `<span class="delta-badge">+${formatNum(v.delta)}</span>`
    : (v.vpd && tab === 'rising' ? `<span class="delta-badge">≈${formatNum(v.vpd)}/일</span>` : '');
  const meta = [];
  if (v.channel) meta.push(esc(v.channel));
  if (v.subs) meta.push('구독자 ' + formatNum(v.subs));
  if (v.days) meta.push(v.days + '일 전');
  return `
  <a class="card" href="https://www.youtube.com/shorts/${esc(v.id)}" target="_blank" rel="noopener">
    <div class="thumb-box">
      <img loading="lazy" src="${esc(thumbUrl(v))}" alt=""
           onerror="this.onerror=null;this.src='https://i.ytimg.com/vi/${esc(v.id)}/mqdefault.jpg'">
      <span class="rank ${rankCls}">${i + 1}</span>
      <div class="badge-row">${badges}</div>
      ${delta}
      <span class="views-badge">▶ ${formatNum(v.views)}</span>
      <button class="star-btn ${saved ? 'saved' : ''}" data-star="${esc(v.id)}" title="아이템 보드에 저장">${saved ? '★' : '☆'}</button>
    </div>
    <div class="card-body">
      <div class="card-title">${esc(v.title)}</div>
      <div class="card-meta">${meta.map(m => '<span>' + m + '</span>').join('')}</div>
    </div>
  </a>`;
}

function matchesFilter(v) {
  if (activeKw && !(v.title || '').toLowerCase().includes(activeKw.toLowerCase())) return false;
  if (query && !(v.title || '').toLowerCase().includes(query.toLowerCase())) return false;
  return true;
}

function render() {
  const D = window.RADAR_DATA;
  document.getElementById('genTime').textContent =
    '수집: ' + D.generatedAt + ' · 스냅샷 ' + D.historyDays + '일차';

  let html = '';

  if (D.historyDays <= 1) {
    html += '<div class="day1-note">ⓘ 오늘이 수집 1일차예요. 내일부터 "어제 대비 증가량"과 랭킹 변동이 표시됩니다. 오늘은 일평균 조회수(≈/일) 기준 랭킹입니다.</div>';
  }

  // 키워드 칩 (급상승 탭에서만)
  if (tab === 'rising' && D.keywords.length) {
    html += '<div class="kw-section"><h2>🔥 지금 자주 등장하는 소재</h2><div class="kw-chips">';
    for (const k of D.keywords) {
      const on = activeKw === k.kw;
      let extra = '';
      if (k.isNew) extra = '<span class="new">NEW</span>';
      else if (k.surge && k.surge >= 1.5) extra = `<span class="surge">↑${Math.round((k.surge - 1) * 100)}%</span>`;
      html += `<button class="kw-chip ${on ? 'on' : ''}" data-kw="${esc(k.kw)}">#${esc(k.kw)} <span class="cnt">${k.count}</span>${extra}</button>`;
    }
    html += '</div></div>';
  }

  // 탭 & 컨트롤
  const boardCount = Object.keys(items).length;
  html += `<div class="controls">
    <div class="tabs">
      <button data-tab="rising" class="${tab === 'rising' ? 'on' : ''}">🚀 급상승</button>
      <button data-tab="board" class="${tab === 'board' ? 'on' : ''}">⭐ 아이템 보드${boardCount ? ' (' + boardCount + ')' : ''}</button>
    </div>`;
  if (tab !== 'board') {
    html += `<input type="text" id="searchBox" placeholder="제목 검색…" value="${esc(query)}">`;
    if (tab === 'rising') {
      html += `<select id="sortSel">
        <option value="score" ${sortMode === 'score' ? 'selected' : ''}>급상승순</option>
        <option value="views" ${sortMode === 'views' ? 'selected' : ''}>총 조회수순</option>
        <option value="outlier" ${sortMode === 'outlier' ? 'selected' : ''}>💎 떡상 지수순</option>
      </select>`;
    }
  }
  html += '<span class="summary" id="summaryTxt"></span></div>';

  // 떡상 지수 설명 (해당 정렬 선택 시)
  if (tab === 'rising' && sortMode === 'outlier') {
    html += `<div class="info-note">💎 <b>떡상 지수</b> = 조회수 ÷ 구독자 수.
    채널 체급 대비 얼마나 터졌는지를 보여줍니다. 예를 들어 구독자 1만 채널이 100만 뷰를 찍으면 지수 100배 —
    채널 파워가 아니라 <b>소재의 힘</b>으로 터진 영상이라 벤치마킹 가치가 높아요.
    (구독자 1천 명·조회수 10만 이상 영상만 집계, 구독자 수는 어림값이라 지수는 근사치입니다)</div>`;
  }

  // 본문
  if (tab === 'board') {
    html += renderBoard();
  } else {
    let vids = D.recent.filter(matchesFilter);
    if (sortMode === 'views') vids = [...vids].sort((a, b) => b.views - a.views);
    if (sortMode === 'outlier') vids = D.recent.filter(matchesFilter).filter(v => v.outlier != null).sort((a, b) => b.outlier - a.outlier);
    if (!vids.length) {
      html += '<div class="board-empty">조건에 맞는 쇼츠가 없습니다.</div>';
    } else {
      html += '<div class="grid">' + vids.map((v, i) => videoCard(v, i)).join('') + '</div>';
    }
    setTimeout(() => {
      const el = document.getElementById('summaryTxt');
      if (el) el.textContent = vids.length + '개' + (activeKw ? ' · #' + activeKw : '');
    });
  }

  app.innerHTML = html;
  bindEvents();
}

function renderBoard() {
  const list = Object.values(items).sort((a, b) => b.savedAt - a.savedAt);
  if (!list.length) {
    return '<div class="board-empty">아직 저장한 아이템이 없어요.<br>카드의 ☆ 버튼을 눌러 기획 후보를 모아보세요.</div>';
  }
  let html = '<div class="board-grid">';
  for (const it of list) {
    html += `
    <div class="board-card">
      <img loading="lazy" src="${esc(it.thumb || ('https://i.ytimg.com/vi/' + it.id + '/oar2.jpg'))}"
           onerror="this.onerror=null;this.src='https://i.ytimg.com/vi/${esc(it.id)}/mqdefault.jpg'">
      <div class="board-body">
        <div class="board-title"><a href="https://www.youtube.com/shorts/${esc(it.id)}" target="_blank" rel="noopener">${esc(it.title)}</a></div>
        <div class="board-meta">▶ ${formatNum(it.views)} · 저장 ${new Date(it.savedAt).toLocaleDateString('ko-KR')}</div>
        <textarea class="board-memo" data-memo="${esc(it.id)}" placeholder="기획 메모… (자동 저장)">${esc(it.memo || '')}</textarea>
        <div class="board-actions">
          <button class="row-btn" data-remove="${esc(it.id)}">삭제</button>
        </div>
      </div>
    </div>`;
  }
  html += '</div>';
  html += `<div class="io-row">
    <button id="btnExport">📤 백업 내보내기</button>
    <button id="btnImport">📥 백업 불러오기</button>
    <input type="file" id="fileImport" accept=".json" style="display:none">
  </div>`;
  return html;
}

function bindEvents() {
  app.querySelectorAll('[data-tab]').forEach(b => {
    b.onclick = () => { tab = b.dataset.tab; render(); };
  });
  app.querySelectorAll('[data-kw]').forEach(b => {
    b.onclick = () => {
      activeKw = (activeKw === b.dataset.kw) ? null : b.dataset.kw;
      render();
    };
  });
  const sb = document.getElementById('searchBox');
  if (sb) {
    sb.oninput = () => {
      query = sb.value;
      renderGridOnly();
    };
  }
  const ss = document.getElementById('sortSel');
  if (ss) ss.onchange = () => { sortMode = ss.value; render(); };

  app.querySelectorAll('[data-star]').forEach(b => {
    b.onclick = e => {
      e.preventDefault(); e.stopPropagation();
      const id = b.dataset.star;
      if (items[id]) {
        delete items[id];
      } else {
        const D = window.RADAR_DATA;
        const v = D.recent.find(x => x.id === id);
        if (v) items[id] = { id: v.id, title: v.title, thumb: v.thumb || '', views: v.views, memo: '', savedAt: Date.now() };
      }
      saveItems(items);
      b.classList.toggle('saved', !!items[id]);
      b.textContent = items[id] ? '★' : '☆';
    };
  });
  app.querySelectorAll('[data-memo]').forEach(t => {
    t.oninput = () => {
      const id = t.dataset.memo;
      if (items[id]) { items[id].memo = t.value; saveItems(items); }
    };
  });
  app.querySelectorAll('[data-remove]').forEach(b => {
    b.onclick = () => {
      delete items[b.dataset.remove];
      saveItems(items);
      render();
    };
  });
  const be = document.getElementById('btnExport');
  if (be) be.onclick = () => {
    const blob = new Blob([JSON.stringify(items, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'radar-items-' + new Date().toISOString().slice(0, 10) + '.json';
    a.click();
    URL.revokeObjectURL(a.href);
  };
  const bi = document.getElementById('btnImport');
  if (bi) bi.onclick = () => document.getElementById('fileImport').click();
  const fi = document.getElementById('fileImport');
  if (fi) fi.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        if (typeof data !== 'object') throw new Error();
        items = { ...items, ...data };
        saveItems(items);
        render();
      } catch { alert('백업 파일 형식이 올바르지 않습니다.'); }
    };
    reader.readAsText(file);
  };
}

// 검색 입력 중에는 그리드만 갱신 (입력 포커스 유지)
function renderGridOnly() {
  const D = window.RADAR_DATA;
  let vids = D.recent.filter(matchesFilter);
  if (sortMode === 'views') vids = [...vids].sort((a, b) => b.views - a.views);
  if (sortMode === 'outlier') vids = vids.filter(v => v.outlier != null).sort((a, b) => b.outlier - a.outlier);
  const grid = app.querySelector('.grid');
  const empty = app.querySelector('.board-empty');
  const target = grid || empty;
  if (target) {
    const html = vids.length
      ? '<div class="grid">' + vids.map((v, i) => videoCard(v, i)).join('') + '</div>'
      : '<div class="board-empty">조건에 맞는 쇼츠가 없습니다.</div>';
    target.outerHTML = html;
    const el = document.getElementById('summaryTxt');
    if (el) el.textContent = vids.length + '개' + (activeKw ? ' · #' + activeKw : '');
    // 새로 그린 카드의 별 버튼 이벤트 재연결
    app.querySelectorAll('[data-star]').forEach(b => {
      b.onclick = e => {
        e.preventDefault(); e.stopPropagation();
        const id = b.dataset.star;
        if (items[id]) { delete items[id]; }
        else {
          const v = vids.find(x => x.id === id);
          if (v) items[id] = { id: v.id, title: v.title, thumb: v.thumb || '', views: v.views, memo: '', savedAt: Date.now() };
        }
        saveItems(items);
        b.classList.toggle('saved', !!items[id]);
        b.textContent = items[id] ? '★' : '☆';
      };
    });
  }
}

if (window.RADAR_DATA && Array.isArray(window.RADAR_DATA.recent)) {
  render();
} else {
  renderOnboarding();
}
</script>
